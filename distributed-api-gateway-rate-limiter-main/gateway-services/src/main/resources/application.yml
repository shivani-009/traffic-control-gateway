server:
  port: 8082

spring:
  application:
    name: gateway-service

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      routes:
        - id: demo-backend
          uri: http://localhost:8081
          predicates:
            - Path=/api/**

logging:
  level:
    root: INFO
    com.example.gateway: INFO